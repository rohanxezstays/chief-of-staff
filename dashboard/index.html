<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chief of Staff — Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Chief of Staff</h1>
  <nav id="tabs">
    <button id="tabBoard" class="tab active" type="button">Board</button>
    <button id="tabLeads" class="tab" type="button">Leads</button>
  </nav>
  <div id="filters"></div>
</header>
<main id="board"></main>

<dialog id="editDialog">
  <form method="dialog" id="editForm">
    <label>Title <input name="title" required></label>
    <label>Notes <textarea name="notes" rows="3"></textarea></label>
    <label>Stream <select name="stream"></select></label>
    <label>Due <input name="due" type="date"></label>
    <label>Waiting on <input name="waitingOn" placeholder="person / company"></label>
    <div class="checkSection">
      Stages
      <ul id="checkList"></ul>
      <input id="checkNew" type="text" placeholder="add a stage, press Enter">
    </div>
    <menu>
      <button value="delete" class="danger">Delete</button>
      <button value="cancel">Cancel</button>
      <button value="save" class="primary">Save</button>
    </menu>
  </form>
</dialog>

<dialog id="leadDialog">
  <form method="dialog" id="leadForm">
    <label>Name <input name="name" required></label>
    <label>Phone <input name="phone" placeholder="+91..."></label>
    <label>Source
      <select name="source">
        <option>Meta</option><option>Organic</option><option>Walk-in</option><option>Referral</option><option>Other</option>
      </select>
    </label>
    <label>University <input name="university" placeholder="Galgotias / Sharda / ..."></label>
    <label>Notes <textarea name="notes" rows="2"></textarea></label>
    <menu>
      <button value="delete" class="danger">Delete</button>
      <button value="cancel">Cancel</button>
      <button value="save" class="primary">Save</button>
    </menu>
  </form>
</dialog>

<dialog id="streamDialog">
  <h3>Streams</h3>
  <ul id="streamList"></ul>
  <div id="streamAdd">
    <input id="streamNew" type="text" placeholder="new stream name">
    <button id="streamAddBtn" type="button" class="primary">Add</button>
  </div>
  <menu>
    <button id="streamClose" type="button">Close</button>
  </menu>
</dialog>

<script src="app.js"></script>
</body>
</html>
