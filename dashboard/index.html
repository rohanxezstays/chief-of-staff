<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chief of Staff — Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Chief of Staff</h1>
  <div id="filters"></div>
</header>
<main id="board"></main>

<dialog id="editDialog">
  <form method="dialog" id="editForm">
    <label>Title <input name="title" required></label>
    <label>Notes <textarea name="notes" rows="3"></textarea></label>
    <label>Stream <select name="stream"></select></label>
    <label>Due <input name="due" type="date"></label>
    <label>Waiting on <input name="waitingOn" placeholder="person / company"></label>
    <menu>
      <button value="delete" class="danger">Delete</button>
      <button value="cancel">Cancel</button>
      <button value="save" class="primary">Save</button>
    </menu>
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
